<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks - SoftGrid CRM</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="logo">SoftGrid CRM</div>
      <nav>
        <a href="dashboard.html">Customer List</a>
        <a href="employees.html">Employee List</a>
        <a href="tasks.html" class="active">Task List</a>
        <a href="create-task.html">Create Task</a>
        <a href="index.html">Logout</a>
      </nav>
    </aside>
    <div class="main">
      <header class="topbar">
        <h2>Tasks</h2>
        <a href="create-task.html" class="btn-primary">+ Create Task</a>
      </header>
      <div class="content">
        <div class="toolbar">
          <input type="text" placeholder="Search tasks...">
          <select><option>All Status</option><option>Todo</option><option>In Progress</option><option>Done</option></select>
        </div>
        <div class="task-grid">
          <div class="task-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
              <h4>Follow up with TechSoft</h4>
              <span class="priority high">High</span>
            </div>
            <p>Call Ali Khan and confirm deal closure for Q4.</p>
            <div class="progress-wrap"><div class="progress-bar" style="width:60%;"></div></div>
            <div class="task-meta">
              <span class="badge inprogress">In Progress</span>
              <span>Due: Oct 12</span>
            </div>
          </div>
          <div class="task-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
              <h4>Update CRM Docs</h4>
              <span class="priority low">Low</span>
            </div>
            <p>Add new employee onboarding SOP to wiki.</p>
            <div class="progress-wrap"><div class="progress-bar" style="width:100%;"></div></div>
            <div class="task-meta">
              <span class="badge done">Done</span>
              <span>Completed</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
