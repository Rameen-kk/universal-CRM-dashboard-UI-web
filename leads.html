<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftGrid CRM - Leads</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="logo">SoftGrid CRM</div>
     <nav>
  <a href="dashboard.html">Customer List</a>
  <a href="leads.html" class="active">Lead Management</a>
  <a href="employees.html">Employee List</a>
  <a href="tasks.html">Task List</a>
  <a href="index.html">Logout</a>
</nav>
    </aside>

    <div class="main">
      <header class="topbar">
        <h2>Leads</h2>
        <a href="add-lead.html" class="btn-primary">+ New Lead</a>
      </header>

      <div class="content">
        <div class="grid">
          <div class="kpi"><h3>Total Leads</h3><p>312</p></div>
          <div class="kpi"><h3>New Leads</h3><p>45</p></div>
          <div class="kpi"><h3>Contacted</h3><p>128</p></div>
          <div class="kpi"><h3>Won</h3><p>34</p></div>
        </div>

        <div class="card">
          <h3 style="margin:0 0 20px;">Lead Database</h3>
          <div class="toolbar">
            <input type="text" placeholder="Search leads...">
            <select>
              <option value="">All Status</option>
              <option value="new">New</option>
              <option value="contacted">Contacted</option>
              <option value="won">Won</option>
              <option value="lost">Lost</option>
            </select>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>Name</th><th>Email</th><th>Company</th><th>Status</th><th>Action</th></tr>
              </thead>
              <tbody>
                <tr>
                  <td>Zain Malik</td><td>zain@mail.com</td><td>Alpha Co</td>
                  <td><span class="badge new">New</span></td>
                  <td><button class="btn-icon">View</button></td>
                </tr>
                <tr>
                  <td>Maryam Ali</td><td>maryam@mail.com</td><td>Beta Ltd</td>
                  <td><span class="badge contacted">Contacted</span></td>
                  <td><button class="btn-icon">View</button></td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="pagination">
            <button>Prev</button><button class="active">1</button><button>2</button><button>Next</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
