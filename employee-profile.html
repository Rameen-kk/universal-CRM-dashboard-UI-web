<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Profile - SoftGrid CRM</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="logo">SoftGrid CRM</div>
      <nav>
        <a href="dashboard.html">Customer List</a>
        <a href="employees.html">Employee List</a>
        <a href="employee-profile.html" class="active">Employee Profile</a>
        <a href="tasks.html">Task List</a>
        <a href="index.html">Logout</a>
      </nav>
    </aside>
    <div class="main">
      <header class="topbar"><h2>Employee Profile</h2><button class="btn-primary">Assign Task</button></header>
      <div class="content">
        <div class="card">
          <div style="display:flex; gap:20px; align-items:center; margin-bottom:24px; padding-bottom:24px; border-bottom:1px solid var(--border);">
            <img src="https://i.pravatar.cc/100?u=sara" alt="Sara" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--accent);">
            <div><h2 style="margin:0 0 4px;">Sara Ahmed</h2><p style="margin:0 0 8px; color:var(--muted);">Sales Manager</p><span class="badge active">Active</span></div>
          </div>
          <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px;">
            <div><p style="color:var(--muted); font-size:13px; margin:0 0 4px;">Email</p><p style="margin:0; font-weight:600;">sara@softgrid.com</p></div>
            <div><p style="color:var(--muted); font-size:13px; margin:0 0 4px;">Tasks Completed</p><p style="margin:0; font-weight:600;">128</p></div>
            <div><p style="color:var(--muted); font-size:13px; margin:0 0 4px;">Performance</p><p style="margin:0; font-weight:600;">92%</p></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
